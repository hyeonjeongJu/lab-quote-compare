<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>실험시약 견적 비교</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg:#f6f7f9; --card:#fff; --ink:#1a1c20; --sub:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --best:#059669; --best-bg:#ecfdf5; --warn:#dc2626; --receipt:#f9fafb;
    --near-black:#1a1a1a; --near-white:#f4f4f4;  /* 눈 편한 소프트 블랙/오프화이트(순수 #000·#fff는 halation) */
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  @media (prefers-color-scheme: dark){ :root{ --bg:#0f1115;--card:#1a1d23;--ink:#e8eaed;--sub:#9aa1ab;--line:#2b2f37;--accent:#5b8cff;--best:#34d399;--best-bg:#0f2a20;--warn:#f87171;--receipt:#14171c;} }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:820px;margin:0 auto;padding:28px 16px 72px;}
  h1{font-size:22px;margin:0 0 4px;}
  .sub{color:var(--sub);font-size:13px;margin:0;}
  .header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
  .titles{min-width:0;}
  button{padding:9px 16px;border:0;border-radius:10px;background:var(--near-black);color:var(--near-white);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .12s;}
  button:hover{opacity:.88;}
  button:disabled{opacity:.5;cursor:default;}
  @media (prefers-color-scheme: dark){ button{background:var(--near-white);color:var(--near-black);} }
  #pick{display:inline-flex;flex-direction:column;align-items:center;gap:3px;padding:10px 22px;font-size:15px;background:var(--near-black);color:var(--near-white);margin-left:auto;}
  #pick:hover{filter:none;opacity:.88;}
  #pick .hint{font-weight:400;font-size:11px;opacity:.75;}
  @media (prefers-color-scheme: dark){ #pick{background:var(--near-white);color:var(--near-black);} }
  .status{font-size:13px;color:var(--sub);margin-top:10px;font-family:var(--mono);}

  .prod{border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden;}
  .prod-h{padding:12px 14px;background:var(--receipt);border-bottom:1px solid var(--line);}
  .prod-h .code{font-family:var(--mono);font-weight:700;font-size:14px;}
  .prod-h .nm{font-size:13px;color:var(--sub);}
  .tw{overflow-x:auto;}                                   /* 좁아지면 가로 스크롤(찌그러짐 방지) */
  table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;min-width:640px;}
  th,td{text-align:left;padding:9px 14px;border-top:1px solid var(--line);word-break:break-word;vertical-align:top;}
  td.ell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}  /* 넘치면 … , hover시 #tip 말풍선 */
  #tip{position:fixed;z-index:50;max-width:320px;padding:7px 10px;border-radius:8px;
    background:#1f2430;color:#f2f4f8;font-size:12px;line-height:1.5;
    box-shadow:0 6px 20px rgba(0,0,0,.28);pointer-events:none;opacity:0;transition:opacity .12s;
    white-space:normal;word-break:break-word;}
  #tip.show{opacity:1;}
  th{color:var(--sub);font-weight:600;font-size:12px;}
  td.num{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  td.dt{white-space:nowrap;}
  tr.best{background:var(--best-bg);}
  tr.best td.unit{color:var(--best);font-weight:700;}
  tr.cut td.dt{color:var(--warn);text-decoration:line-through;}   /* 만료: 만료일에 취소선(~~) */
  .crown{color:var(--best);}
  .expired{color:var(--warn);font-size:11px;}
  .muted{color:var(--sub);font-size:13px;font-family:var(--mono);}
  .toolbar{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin:0 2px 12px;min-height:22px;}
  .chk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);cursor:pointer;user-select:none;}
  .chk input{cursor:pointer;}
  .count{color:var(--sub);font-size:12px;font-family:var(--mono);margin-right:auto;}

  /* 탭 */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;}
  .tab{background:none;color:var(--sub);border:0;border-bottom:2px solid transparent;border-radius:0;padding:8px 14px;font-size:14px;font-weight:600;filter:none;}
  .tab:hover{filter:none;color:var(--ink);}
  .tab.active{color:var(--ink);border-bottom-color:var(--near-black);}
  @media (prefers-color-scheme: dark){ .tab.active{border-bottom-color:var(--near-white);} }
  /* 누적 진행 배너 */
  .progress{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px;background:var(--card);}
  .plabel{font-size:13px;margin-bottom:10px;}
  .badges{display:flex;flex-wrap:wrap;gap:8px;}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:var(--bg);font-size:13px;}
  .badge b{font-family:var(--mono);}
  .badge.near{border-color:var(--warn);color:var(--warn);}
  .badge.over{background:var(--warn);color:#fff;border-color:var(--warn);}
  /* 구매 버튼(비교표) */
  button.buy{padding:4px 10px;font-size:12px;background:var(--near-black);color:var(--near-white);}
  @media (prefers-color-scheme: dark){ button.buy{background:var(--near-white);color:var(--near-black);} }
  td.act{text-align:center;}
  /* 구매내역 */
  .toolbar{flex-wrap:wrap;}
  th.srt{cursor:pointer;user-select:none;white-space:nowrap;}
  th.srt:hover{color:var(--ink);}
  td.vcell{cursor:pointer;}
  td.vcell:hover{text-decoration:underline;}
  select{padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);font-size:13px;max-width:60vw;}
  select.thsel{padding:0;border:0;background:transparent;color:var(--sub);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;max-width:100%;}
  select.thsel:hover{color:var(--ink);}
  .manual-add{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px;padding:10px;border:1px dashed var(--line);border-radius:10px;}
  .manual-add input,.manual-add select{padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--ink);font-size:13px;min-width:0;}
  .manual-add button{padding:6px 14px;font-size:13px;margin-left:auto;}
  .settle-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin:16px 2px;}
  #settleBtn{background:var(--near-black);color:var(--near-white);}
  #settleBtn:hover{filter:none;opacity:.88;}
  @media (prefers-color-scheme: dark){ #settleBtn{background:var(--near-white);color:var(--near-black);} }
  button.ghost{background:none;color:var(--sub);padding:4px 8px;font-size:12px;filter:none;}
  button.ghost:hover{filter:none;color:var(--ink);}
  .set-hist .item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:13px;}
  /* 구매 다이얼로그 */
  dialog{border:1px solid var(--line);border-radius:14px;padding:20px;background:var(--card);color:var(--ink);max-width:340px;width:90%;}
  dialog::backdrop{background:rgba(0,0,0,.4);}
  dialog h3{margin:0 0 14px;font-size:16px;}
  dialog form{display:flex;flex-direction:column;gap:12px;}
  dialog label{display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--sub);}
  dialog input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font-size:14px;}
  .dlg-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .flabel{font-size:13px;color:var(--sub);}
  #upVendors{display:flex;flex-wrap:wrap;gap:8px;}
  #upVendors label{flex-direction:row;align-items:center;gap:5px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;color:var(--ink);cursor:pointer;}
  #upVendors label.off{opacity:.4;cursor:not-allowed;}
  #upVendors input{padding:0;}
  /* 업체 관리 */
  .vadd{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px;padding:10px;border:1px dashed var(--line);border-radius:10px;}
  .vadd input{flex:1;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--ink);font-size:13px;min-width:0;}
  .vadd button{padding:6px 14px;font-size:13px;margin-left:auto;}
  .vrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:14px;}
  .vrow .tag{font-size:11px;color:var(--sub);border:1px solid var(--line);border-radius:99px;padding:1px 8px;margin-left:8px;}
  #vaddBtn{background:var(--near-black);color:var(--near-white);}
  #vaddBtn:hover{filter:none;opacity:.88;}
  @media (prefers-color-scheme: dark){ #vaddBtn{background:var(--near-white);color:var(--near-black);} }
  .help{font-size:12.5px;color:var(--sub);line-height:1.6;margin:0 2px 14px;}
  .vbadge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:var(--bg);font-size:13px;}
  .vbadge .vx{background:none;border:0;color:var(--sub);cursor:pointer;padding:0;font-size:12px;line-height:1;filter:none;}
  .vbadge .vx:hover{color:var(--warn);filter:none;}
  .vdel{color:var(--warn);}
  #delSetBtn{color:var(--warn);}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="titles">
      <h1>🧪 실험시약 견적 비교</h1>
      <p class="sub">견적서(.xls/.pdf) 올리면 상품코드별로 최저가(단위당)를 비교해줘요.</p>
    </div>
    <button id="pick">📎 견적서 올리기</button>
  </div>
  <div class="status" id="status"></div>

  <div class="progress" id="progress"></div>

  <div class="tabs">
    <button class="tab active" data-tab="compare">견적 비교</button>
    <button class="tab" data-tab="purchases">구매내역</button>
    <button class="tab" data-tab="vendors" style="margin-left:auto">업체 관리</button>
  </div>

  <section id="tab-compare">
    <div class="toolbar">
      <span class="count" id="count"></span>
      <label class="chk"><input type="checkbox" id="hideExpired"> 만료된 견적 숨기기</label>
    </div>
    <div id="out"><p class="muted">불러오는 중…</p></div>
  </section>

  <section id="tab-purchases" hidden>
    <div id="pout"><p class="muted">불러오는 중…</p></div>
  </section>

  <section id="tab-vendors" hidden>
    <div id="vout"><p class="muted">불러오는 중…</p></div>
  </section>
</div>
<div id="tip"></div>
<dialog id="upDlg">
  <form method="dialog">
    <h3>📎 견적서 업로드</h3>
    <div class="field"><span class="flabel">어느 업체 견적서인가요?</span><div id="upVendors"></div></div>
    <label>파일 (.xls · .pdf · 여러 개)<input type="file" id="upFile" accept=".xls,.xlsx,.pdf" multiple></label>
    <div class="dlg-actions">
      <button value="cancel" class="ghost" type="submit">취소</button>
      <button value="ok" type="submit">업로드</button>
    </div>
  </form>
</dialog>
<dialog id="buyDlg">
  <form method="dialog">
    <h3 id="buyTitle">구매 기록</h3>
    <label>단가(포장당) <input id="buyPrice" type="number" min="0"></label>
    <label>수량 <input id="buyQty" type="number" min="1" value="1"></label>
    <label>구매일 <input id="buyDate" type="date"></label>
    <div class="dlg-actions">
      <button value="cancel" class="ghost" type="submit">취소</button>
      <button id="buyOk" value="ok" type="submit">기록</button>
    </div>
  </form>
</dialog>

<script type="module">
  const $ = s => document.querySelector(s);
  const won = n => (n == null ? "-" : Number(n).toLocaleString() + "원");
  const today = new Date().toISOString().slice(0, 10);
  const attr = s => String(s ?? "").replace(/"/g, "&quot;");   // data-full 속성 안전

  // 커스텀 툴팁: .ell 셀이 잘렸을 때(넘칠 때)만 커서 옆에 까만 말풍선
  const tip = $("#tip");
  const place = e => { tip.style.left = Math.min(e.clientX + 14, innerWidth - tip.offsetWidth - 8) + "px"; tip.style.top = Math.min(e.clientY + 14, innerHeight - tip.offsetHeight - 8) + "px"; };
  $("#out").addEventListener("mouseover", e => {
    const el = e.target.closest(".ell"); if (!el) return;
    if (el.scrollWidth <= el.clientWidth) return;              // 안 잘렸으면 안 띄움
    const full = el.dataset.full || ""; if (!full) return;
    tip.textContent = full; tip.classList.add("show"); place(e);
  });
  $("#out").addEventListener("mousemove", e => { if (tip.classList.contains("show")) place(e); });
  $("#out").addEventListener("mouseout", e => { if (e.target.closest(".ell")) tip.classList.remove("show"); });

  async function uploadOne(file, vendor) {
    const r = await fetch("/api/upload?name=" + encodeURIComponent(file.name) + "&vendor=" + encodeURIComponent(vendor), {
      method: "POST", headers: { "content-type": "application/octet-stream" }, body: file,
    });
    const j = await r.json();
    if (!r.ok) throw new Error((j.error || "실패") + " (" + file.name + ")");
    return j;
  }

  // 업로드 다이얼로그 — 업체 라디오(활성만 선택가능) + 파일
  const upDlg = $("#upDlg");
  $("#pick").onclick = () => {
    const act = vendorsList.filter(v => v.active);            // 활성(업로드 지원) 업체만 노출
    const defv = (act.find(v => v.name === "비티비(동인)") || act[0] || {}).name;
    $("#upVendors").innerHTML = act.length
      ? act.map(v => `<label><input type="radio" name="upv" value="${attr(v.name)}" ${v.name === defv ? "checked" : ""}> ${v.name}</label>`).join("")
      : `<span class="muted">업로드 지원 업체가 없어요.</span>`;
    $("#upFile").value = "";
    upDlg.showModal();
  };
  upDlg.addEventListener("close", async () => {
    if (upDlg.returnValue !== "ok") return;
    const v = $("#upVendors").querySelector('input[name="upv"]:checked');
    const files = [...$("#upFile").files];
    if (!v) { $("#status").textContent = "업체를 선택하세요."; return; }
    if (!files.length) { $("#status").textContent = "파일을 선택하세요."; return; }
    $("#pick").disabled = true;
    try {
      const results = [];
      for (const f of files) { $("#status").textContent = `업로드 중… ${f.name}`; results.push(await uploadOne(f, v.value)); }
      $("#status").textContent = results.map(r => `✅ ${r.vendor||"?"} — ${r.items}개`).join("  ·  ");
      await loadComparison();
    } catch (e) {
      $("#status").textContent = "오류: " + e.message;
    } finally { $("#pick").disabled = false; }
  });

  const isExpired = r => r.expiration_date && r.expiration_date.slice(0, 10) < today;
  let cache = [];   // 마지막으로 불러온 전체 rows (필터는 화면단에서)

  async function loadComparison() {
    const r = await fetch("/api/comparison");
    const { rows, error } = await r.json();
    if (error) { $("#out").innerHTML = `<p class="muted">오류: ${error}</p>`; return; }
    cache = rows || [];
    render();
  }

  $("#hideExpired").onchange = render;

  function render() {
    const out = $("#out");
    const hideExp = $("#hideExpired").checked;
    const rows = hideExp ? cache.filter(r => !isExpired(r)) : cache;
    const hidden = cache.length - rows.length;
    $("#count").textContent = cache.length ? (hideExp && hidden ? `만료 ${hidden}건 숨김` : "") : "";
    if (!cache.length) { out.innerHTML = `<p class="muted">아직 데이터 없음 — 견적서를 올려보세요.</p>`; return; }
    if (!rows.length) { out.innerHTML = `<p class="muted">표시할 견적이 없어요 (전부 만료). 체크 해제하면 보여요.</p>`; return; }

    // 코드별 그룹 (필터된 rows 기준 → 🏆도 남은 것들로 재계산)
    const groups = {};
    for (const row of rows) (groups[row.code] ||= { code: row.code, name: row.name, spec: row.spec, unit: row.spec_unit, rows: [] }).rows.push(row);

    out.innerHTML = Object.values(groups).map(g => {
      // 최저 단위가(없으면 최저 총액)로 best 판정
      const hasUnit = g.rows.some(r => r.unit_price != null);
      const key = r => hasUnit ? (r.unit_price != null ? Number(r.unit_price) : Infinity) : Number(r.price);
      const live = g.rows.filter(r => !isExpired(r));            // 만료 안 된 견적만 최저가 후보
      const best = live.length ? Math.min(...live.map(key)) : null;
      const body = g.rows.map(r => {
        const exp = isExpired(r);
        const isBest = best != null && !exp && key(r) === best;
        return `<tr class="${isBest ? "best" : ""}${exp ? " cut" : ""}">
          <td class="ell" data-full="${attr(r.vendor)}">${isBest ? '<span class="crown">🏆</span> ' : ""}${r.vendor || "?"}</td>
          <td class="muted ell" data-full="${attr(r.manufacturer)}">${r.manufacturer || ""}</td>
          <td class="num">${won(r.price)}</td>
          <td class="num unit">${r.unit_price != null ? Number(r.unit_price).toLocaleString() + "원/" + r.spec_unit : '<span class="muted">규격?</span>'}</td>
          <td class="dt">${r.expiration_date ? r.expiration_date.slice(0,10) : "-"}</td>
          <td class="muted ell" data-full="${attr(r.memo)}">${r.memo || ""}</td>
          <td class="act"><button class="buy" data-code="${attr(g.code)}" data-name="${attr(g.name)}" data-vendor="${attr(r.vendor)}" data-price="${r.price}">구매</button></td>
        </tr>`;
      }).join("");
      return `<div class="prod">
        <div class="prod-h"><span class="code">${g.code}</span> · <span class="nm">${g.name || ""}${g.spec ? " ("+g.spec+")" : ""}</span></div>
        <div class="tw"><table>
        <colgroup><col style="width:22%"><col style="width:15%"><col style="width:12%"><col style="width:13%"><col style="width:13%"><col style="width:15%"><col style="width:10%"></colgroup>
        <thead><tr><th>업체</th><th>제조사</th><th style="text-align:right">가격</th><th style="text-align:right">단위당</th><th>만료일</th><th>비고</th><th style="text-align:center">구매</th></tr></thead>
        <tbody>${body}</tbody></table></div>
      </div>`;
    }).join("");
  }

  // ── 탭 전환 ──
  document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === t));
    $("#tab-compare").hidden = t.dataset.tab !== "compare";
    $("#tab-purchases").hidden = t.dataset.tab !== "purchases";
    $("#tab-vendors").hidden = t.dataset.tab !== "vendors";
  });

  // ── 업체 관리 ──
  async function loadVendors() {
    const r = await fetch("/api/vendors");
    vendorsList = (await r.json()).vendors || [];
    renderVendors();
    renderPurchases();   // 업체 변경 시 수동추가 셀렉트도 최신화
  }
  function renderVendors() {
    const badges = vendorsList.map(v => `<span class="vbadge">${v.name}${v.builtin ? "" : `<button class="vx" data-vdel="${v.id}" title="삭제">✕</button>`}</span>`).join("");
    $("#vout").innerHTML = `
      <p class="help">여기서 추가하신 업체만 구매내역의 <b>수동 구매 입력</b>에서 선택하실 수 있어요.<br>견적 업로드 지원 업체는 기본으로 등록되어 있으며, 삭제할 수 없습니다.</p>
      <div class="vadd"><input id="vname" placeholder="새 업체명 입력" maxlength="40"><button id="vaddBtn">추가</button></div>
      <div class="badges">${badges || `<span class="muted">업체가 없어요.</span>`}</div>`;
    $("#vaddBtn").onclick = addVendorUI;
    $("#vname").onkeydown = e => { if (e.key === "Enter") addVendorUI(); };
  }
  async function addVendorUI() {
    const name = $("#vname").value.trim(); if (!name) return;
    await fetch("/api/vendors", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name }) });
    await loadVendors();
  }
  $("#vout").addEventListener("click", async e => {   // 업체 삭제(기본 등록 제외)
    const d = e.target.closest("[data-vdel]"); if (!d) return;
    if (!confirm("이 업체를 삭제할까요?\n이미 기록된 구매·견적의 업체명은 그대로 유지돼요.")) return;
    const r = await fetch("/api/vendors?id=" + d.dataset.vdel, { method: "DELETE" });
    if (!r.ok) { alert((await r.json()).error || "삭제 실패"); return; }
    await loadVendors();
  });

  // ── 구매/정산 ──
  const TARGET = 3000000;                    // 정산 목표액(300만원)
  let pdata = { open: { rows: [], total: 0 }, settlements: [] };
  let viewSel = "open";                      // 구매내역 탭에서 보는 정산 (open=미정산 사이클)
  const setCache = {};                       // 지난 정산 구매 상세 캐시
  let sortKey = "purchased_at", sortDir = "desc", vendorFilter = "";   // 구매내역 정렬/필터 상태
  let vendorsList = [];                      // 업체 마스터 (업로드 라디오·업체관리 공용)

  async function loadPurchases() {
    const r = await fetch("/api/purchases");
    pdata = await r.json();
    for (const k in setCache) delete setCache[k];   // 갱신되면 캐시 무효화
    renderProgress(); await renderPurchases();
  }

  async function fetchSettlement(id) {
    if (setCache[id]) return setCache[id];
    const r = await fetch("/api/settlement?id=" + id);
    return (setCache[id] = (await r.json()).rows || []);
  }

  function renderProgress() {
    const rows = pdata.open?.rows || [];
    const byV = {};
    for (const r of rows) byV[r.vendor] = (byV[r.vendor] || 0) + Number(r.amount ?? r.unit_price * r.qty);
    const vendors = Object.entries(byV).sort((a, b) => b[1] - a[1]);   // 큰 금액 먼저
    const el = $("#progress");
    if (!vendors.length) { el.innerHTML = `<span class="muted">미정산 구매가 없어요.</span>`; return; }
    el.innerHTML = `<div class="plabel">업체별 미정산 누적 <span class="muted">· 업체당 월 한도 ${won(TARGET)}</span></div>
      <div class="badges">${vendors.map(([v, amt]) => {
        const over = amt >= TARGET;                       // 초과만 빨강, 나머지는 초록 그라데이션
        const ratio = Math.min(1, amt / TARGET);
        const L = 94 - ratio * 58;                        // 미만: 94%(연녹) → 36%(짙은 초록)
        const bg = over ? "hsl(0 68% 56%)" : `hsl(150 55% ${L}%)`;
        const border = over ? "hsl(0 58% 46%)" : `hsl(150 45% ${Math.max(30, L - 14)}%)`;
        const fg = over ? "#fff" : (L < 58 ? "#fff" : "#0f5132");
        return `<span class="badge" style="background:${bg};border-color:${border};color:${fg}">${over ? "⚠️ " : ""}${v} · <b>${won(amt)}</b></span>`;
      }).join("")}</div>`;
  }

  async function renderPurchases() {
    if (!pdata.settlements.some(s => String(s.id) === String(viewSel))) viewSel = "open";   // 선택 유효성
    const opts = [`<option value="open">현재 (미정산) · ${won(pdata.open.total)}</option>`]
      .concat(pdata.settlements.map(s =>
        `<option value="${s.id}">${s.vendor ? s.vendor + " · " : ""}${(s.settled_at||"").slice(0,10)} · ${won(s.total_amount)}</option>`)).join("");

    const isOpen = viewSel === "open";
    const all = isOpen ? pdata.open.rows : await fetchSettlement(viewSel);
    const amt = r => Number(r.amount ?? r.unit_price * r.qty);

    // 업체 필터
    const vendors = [...new Set(all.map(r => r.vendor).filter(Boolean))].sort();
    if (vendorFilter && !vendors.includes(vendorFilter)) vendorFilter = "";
    let view = vendorFilter ? all.filter(r => r.vendor === vendorFilter) : all.slice();
    // 정렬 (헤더 클릭: 단가/수량/금액/구매일)
    const val = { unit_price: r => Number(r.unit_price), qty: r => Number(r.qty), amount: amt, purchased_at: r => (r.purchased_at || "") };
    view.sort((a, b) => { const x = val[sortKey](a), y = val[sortKey](b); const c = x < y ? -1 : x > y ? 1 : 0; return sortDir === "asc" ? c : -c; });
    const total = view.reduce((s, r) => s + amt(r), 0);
    const arr = k => sortKey === k ? (sortDir === "asc" ? " ▲" : " ▼") : "";

    const body = view.map(r => `<tr>
      <td class="ell" data-full="${attr(r.code + " " + (r.name || ""))}"><b>${r.code}</b> ${r.name || ""}</td>
      <td class="ell vcell" data-full="${attr(r.vendor)}" data-vf="${attr(r.vendor)}" title="이 업체만 보기">${r.vendor || ""}</td>
      <td class="num">${won(r.unit_price)}</td>
      <td class="num">${r.qty}</td>
      <td class="num">${won(amt(r))}</td>
      <td class="dt">${(r.purchased_at || "").slice(0,10) || "-"}</td>
      ${isOpen ? `<td class="act"><button class="ghost" data-del="${r.id}" title="삭제">✕</button></td>` : ""}
    </tr>`).join("");
    const cols = isOpen
      ? `<col style="width:28%"><col style="width:19%"><col style="width:13%"><col style="width:9%"><col style="width:14%"><col style="width:11%"><col style="width:6%">`
      : `<col style="width:30%"><col style="width:21%"><col style="width:14%"><col style="width:10%"><col style="width:15%"><col style="width:10%">`;
    const th = `<thead><tr>
        <th>상품</th>
        <th><select id="vendorFilter" class="thsel"><option value="">업체 (전체)</option>${vendors.map(v => `<option value="${attr(v)}">${v}</option>`).join("")}</select></th>
        <th class="srt" data-k="unit_price" style="text-align:right">단가${arr("unit_price")}</th>
        <th class="srt" data-k="qty" style="text-align:right">수량${arr("qty")}</th>
        <th class="srt" data-k="amount" style="text-align:right">금액${arr("amount")}</th>
        <th class="srt" data-k="purchased_at">구매일${arr("purchased_at")}</th>
        ${isOpen ? "<th></th>" : ""}</tr></thead>`;
    const tableBlock = all.length ? `<div class="tw"><table><colgroup>${cols}</colgroup>${th}<tbody>${body}</tbody></table></div>`
      : `<p class="muted">${isOpen ? "현재 사이클에 구매내역이 없어요. 견적 비교 탭에서 [구매]를 눌러 담아보세요." : "이 정산에 구매내역이 없어요."}</p>`;
    const settleBtn = (isOpen && vendorFilter && view.length) ? `<button id="settleBtn">📄 ${vendorFilter} 정산서 생성 (${won(total)})</button>` : "";
    const settleHint = (isOpen && all.length && !vendorFilter) ? `<span class="muted">정산서는 업체별로 만들어요 — 표의 업체명을 클릭해 그 업체만 필터한 뒤 생성하세요.</span>` : "";
    const vopts = vendorsList.map(v => `<option value="${attr(v.name)}"${v.name === "비티비(동인)" ? " selected" : ""}>${v.name}</option>`).join("");
    const manualRow = isOpen ? `<div class="manual-add">
        <input id="mCode" placeholder="상품코드" style="flex:1 1 100px">
        <input id="mName" placeholder="품명" style="flex:1 1 100px">
        <select id="mVendor">${vopts}</select>
        <input id="mPrice" type="number" min="0" placeholder="단가" style="width:88px">
        <input id="mQty" type="number" min="1" value="1" placeholder="수량" style="width:60px">
        <input id="mDate" type="date" value="${today}">
        <button id="mAdd">추가</button>
      </div>` : "";
    $("#pout").innerHTML = `
      <div class="toolbar">
        <span class="count">${view.length}건 · 합계 <b>${won(total)}</b></span>
        <select id="setSel" style="margin-left:auto">${opts}</select>
        <button class="ghost" id="csvBtn">⬇ CSV 내려받기</button>
      </div>
      ${manualRow}
      ${tableBlock}
      ${(settleBtn || settleHint) ? `<div class="settle-row"><span></span>${settleBtn || settleHint}</div>` : ""}
      ${!isOpen ? `<div class="settle-row"><span></span><button id="delSetBtn" class="ghost">🗑 이 정산서 삭제</button></div>` : ""}`;

    $("#setSel").value = viewSel;
    $("#setSel").onchange = async e => { viewSel = e.target.value; await renderPurchases(); };
    const vf = $("#vendorFilter"); if (vf) { vf.value = vendorFilter; vf.onchange = e => { vendorFilter = e.target.value; renderPurchases(); }; }
    $("#pout").querySelectorAll("th.srt").forEach(el => el.onclick = () => {
      const k = el.dataset.k;
      if (sortKey === k) sortDir = sortDir === "asc" ? "desc" : "asc";
      else { sortKey = k; sortDir = k === "purchased_at" ? "desc" : "asc"; }
      renderPurchases();
    });
    $("#csvBtn").onclick = () => {
      const label = isOpen ? "현재_" + today
        : "정산_" + ((pdata.settlements.find(s => String(s.id) === String(viewSel)) || {}).settled_at || "").slice(0,10);
      csvDownload(view, label);        // 화면에 보이는(필터·정렬된) 그대로 내보냄
    };
    const sb = $("#settleBtn"); if (sb) sb.onclick = doSettle;
    const ma = $("#mAdd"); if (ma) ma.onclick = addManual;
    const ds = $("#delSetBtn"); if (ds) ds.onclick = delSettlement;
  }

  async function delSettlement() {
    if (!confirm("이 정산서를 삭제할까요?\n딸린 구매 기록도 함께 삭제되고 되돌릴 수 없어요.")) return;
    const r = await fetch("/api/settlement?id=" + viewSel, { method: "DELETE" });
    if (!r.ok) { alert("삭제 실패"); return; }
    viewSel = "open";
    await loadPurchases();
  }

  // 수동 구매 추가 (표 위 인라인 한 줄) — 전 필드 필수
  async function addManual() {
    const body = { code: $("#mCode").value.trim(), name: $("#mName").value.trim(), vendor: $("#mVendor").value,
      unitPrice: Number($("#mPrice").value), qty: Number($("#mQty").value), purchasedAt: $("#mDate").value };
    if (!body.code || !body.name || !body.vendor || !body.unitPrice || !body.qty || !body.purchasedAt) {
      $("#status").textContent = "모든 값을 입력하세요 (상품코드·품명·업체·단가·수량·구매일)."; return;
    }
    if (!vendorsList.some(v => v.name === body.vendor)) { $("#status").textContent = "목록에 없는 업체예요. 업체 관리에서 확인하세요."; return; }
    await fetch("/api/purchases", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
    await loadPurchases();
  }

  // 구매 버튼(비교표) → 다이얼로그
  const dlg = $("#buyDlg"); let buyCtx = null;
  $("#out").addEventListener("click", e => {
    const b = e.target.closest(".buy"); if (!b) return;
    buyCtx = { code: b.dataset.code, name: b.dataset.name, vendor: b.dataset.vendor };
    $("#buyTitle").textContent = "구매 기록 — " + b.dataset.code;
    $("#buyPrice").value = b.dataset.price; $("#buyQty").value = 1; $("#buyDate").value = today;
    dlg.showModal();
  });
  dlg.addEventListener("close", async () => {
    if (dlg.returnValue !== "ok" || !buyCtx) return;
    const body = { ...buyCtx, unitPrice: Number($("#buyPrice").value), qty: Number($("#buyQty").value) || 1, purchasedAt: $("#buyDate").value };
    if (!body.unitPrice || !body.purchasedAt) return;
    await fetch("/api/purchases", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
    await loadPurchases();
  });

  // 구매내역 탭: 업체 셀 클릭=그 업체만 필터(재클릭 해제) / 구매 삭제(열린 사이클만)
  $("#pout").addEventListener("click", async e => {
    const vc = e.target.closest("[data-vf]");
    if (vc) { vendorFilter = vendorFilter === vc.dataset.vf ? "" : vc.dataset.vf; renderPurchases(); return; }
    const del = e.target.closest("[data-del]");
    if (del && confirm("이 구매를 삭제할까요?")) {
      await fetch("/api/purchases?id=" + del.dataset.del, { method: "DELETE" });
      await loadPurchases();
    }
  });

  async function doSettle() {
    const vendor = vendorFilter;
    if (!vendor) return;
    const total = pdata.open.rows.filter(r => r.vendor === vendor).reduce((s, r) => s + Number(r.amount ?? r.unit_price * r.qty), 0);
    if (!confirm(`[${vendor}] 미정산 ${won(total)}을 정산서로 발행할까요?\n발행 후 이 구매들은 정산 처리돼요 (상품·견적은 유지).`)) return;
    const r = await fetch("/api/settlement", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ settledAt: today, vendor }) });
    const j = await r.json();
    if (!r.ok) { alert("오류: " + (j.error || "실패")); return; }
    viewSel = String(j.id);                              // 새로 만든 정산으로 화면 전환
    await loadPurchases();
    csvDownload(await fetchSettlement(j.id), "정산_" + vendor + "_" + today);   // 생성 즉시 CSV 다운로드
  }

  // CSV 내보내기(엑셀에서 열림, BOM 포함). 양식 임시 — 나중 교체 가능
  function csvDownload(rows, name) {
    const q = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
    const amt = x => Number(x.amount ?? x.unit_price * x.qty);
    const total = (rows || []).reduce((s, x) => s + amt(x), 0);
    const lines = [["상품코드","품명","업체","단가","수량","금액","구매일"].join(",")]
      .concat((rows || []).map(x => [x.code, x.name, x.vendor, x.unit_price, x.qty, amt(x), (x.purchased_at || "").slice(0,10)].map(q).join(",")))
      .concat([["합계","","","","",total,""].map(q).join(",")]);   // 마지막 줄 합계
    const blob = new Blob(["﻿" + lines.join("\r\n")], { type: "text/csv;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `${name || "export"}.csv`; a.click();
    URL.revokeObjectURL(a.href);
  }

  loadComparison();
  loadPurchases();
  loadVendors();
</script>

</body>
